name: Publish Release (build + attach assets)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-artifact

      - name: Prepare static files
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf src/leropilot/static || true
          mkdir -p src/leropilot/static
          cp -r frontend-artifact/* src/leropilot/static/ || true
          ls -la src/leropilot/static || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: PyInstaller build
        run: |
          set -euxo pipefail
          # Ensure build.spec exists; generate minimal spec if missing
          if [ ! -f build.spec ]; then
            cat > build.spec <<'SPEC'
# -*- mode: python ; coding: utf-8 -*-

block_cipher = None

a = Analysis(
    ['src/leropilot/main.py'],
    pathex=[],
    binaries=[],
    datas=[
        ('src/leropilot/static', 'leropilot/static'),
    ],
    hiddenimports=[],
    hookspath=[],
    hooksconfig={},
    runtime_hooks=[],
    excludes=['torch', 'tensorflow', 'matplotlib', 'pytest'],
    win_no_prefer_redirects=False,
    win_private_assemblies=False,
    cipher=block_cipher,
    noarchive=False,
)

pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

exe = EXE(
    pyz,
    a.scripts,
    a.binaries,
    a.zipfiles,
    a.datas,
    [],
    name='leropilot',
    debug=False,
    bootloader_ignore_signals=False,
    strip=False,
    upx=True,
    upx_exclude=[],
    runtime_tmpdir=None,
    console=True,
    disable_windowed_traceback=False,
    argv_emulation=False,
    target_arch=None,
    codesign_identity=None,
    entitlements_file=None,
)
SPEC
          fi
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            py -3 -m PyInstaller --noconfirm --clean build.spec
          else
            pyinstaller --noconfirm --clean build.spec
          fi

      - name: Prepare release files
        run: |
          mkdir -p release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/leropilot.exe release/leropilot-${{ github.ref_name }}-win.exe || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp -r dist/leropilot release/leropilot-${{ github.ref_name }}-mac || true
          else
            cp dist/leropilot release/leropilot-${{ github.ref_name }}-linux || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-${{ matrix.os }}-${{ github.ref_name }}
          path: release/

  create_release:
    name: Create GitHub Release and attach assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to release
        uses: softprops/gh-release@v1
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
