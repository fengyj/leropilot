# This workflow runs on every push to any branch. It performs a comprehensive
# build across multiple operating systems (Linux, Windows, macOS) to ensure the
# application can be packaged correctly. It also runs linting and tests.
# The resulting binaries are uploaded as artifacts for testing purposes.
name: Build and Test Matrix

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-frontend:
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'build-required')
    name: Build frontend (single job)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Build frontend (with retry)
        shell: bash
        run: |
          set -euxo pipefail
          retry() { local n=1; local max=3; local delay=5; until "$@"; do if [ $n -ge $max ]; then return 1; fi; n=$((n+1)); sleep $delay; done }
          cd frontend
          retry npm install
          retry npm run build
          cd ..
          mkdir -p artifact/frontend
          if [ -d src/leropilot/static ]; then
            cp -r src/leropilot/static/* artifact/frontend/
          else
            echo "No frontend build output found in src/leropilot/static" >&2
            ls -la src/leropilot/ || true
            exit 1
          fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_number }}
          path: artifact/frontend/
          retention-days: 7

  package-pyinstaller:
    name: Package PyInstaller on ${{ matrix.os }}
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.run_number }}
          path: frontend-artifact

      - name: Prepare static files
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          rm -rf src/leropilot/static || true
          mkdir -p src/leropilot/static
          cp -r frontend-artifact/* src/leropilot/static/ || true
          echo "Static files placed:" && ls -la src/leropilot/static || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          uv sync --extra dev

      - name: Run lint
        shell: bash
        run: |
          set -euxo pipefail
          if uv run ruff --version > /dev/null 2>&1; then
            uv run ruff check src
          else
            echo "ruff not available; skipping lint."
          fi

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f pytest.ini ] || [ -d tests ]; then
            uv run python -m pytest -q
          else
            echo "No tests detected; skipping pytest."
          fi

      - name: Diagnostic info
        shell: bash
        run: |
          set -euxo pipefail
          python --version
          uv run python --version
          uv run pyinstaller --version || true
          ls -la

      - name: Generate build.spec if missing
        shell: bash
        run: |
          if [ ! -f build.spec ]; then
            printf '%s\n' \
              '# -*- mode: python ; coding: utf-8 -*-' \
              '' \
              'block_cipher = None' \
              '' \
              'a = Analysis(' \
              "    ['src/leropilot/main.py']," \
              '    pathex=[],' \
              '    binaries=[],' \
              '    datas=[' \
              "        ('src/leropilot/static', 'leropilot/static')," \
              '    ],' \
              '    hiddenimports=[],' \
              '    hookspath=[],' \
              '    hooksconfig={},' \
              '    runtime_hooks=[],' \
              "    excludes=['torch', 'tensorflow', 'matplotlib', 'pytest']," \
              '    win_no_prefer_redirects=False,' \
              '    win_private_assemblies=False,' \
              '    cipher=block_cipher,' \
              '    noarchive=False,' \
              ')' \
              '' \
              'pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)' \
              '' \
              'exe = EXE(' \
              '    pyz,' \
              '    a.scripts,' \
              '    a.binaries,' \
              '    a.zipfiles,' \
              '    a.datas,' \
              '    [],' \
              "    name='leropilot'," \
              '    debug=False,' \
              '    bootloader_ignore_signals=False,' \
              '    strip=False,' \
              '    upx=True,' \
              '    upx_exclude=[],' \
              '    runtime_tmpdir=None,' \
              '    console=True,' \
              '    disable_windowed_traceback=False,' \
              '    argv_emulation=False,' \
              '    target_arch=None,' \
              '    codesign_identity=None,' \
              '    entitlements_file=None,' \
              ')' > build.spec
          fi

      - name: PyInstaller build
        shell: bash
        run: |
          set -euxo pipefail
          uv run python -m PyInstaller --noconfirm --clean --log-level=INFO build.spec

      - name: Prepare release files
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/leropilot.exe release/leropilot-pyinstaller-${{ github.run_id }}-win.exe || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp -r dist/leropilot release/leropilot-pyinstaller-${{ github.run_id }}-mac || true
          else
            cp dist/leropilot release/leropilot-pyinstaller-${{ github.run_id }}-linux || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-pyinstaller-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_number }}
          path: release/
          retention-days: 7

  package-electron:
    name: Package Electron on ${{ matrix.os }}
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.run_number }}
          path: frontend-artifact

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          uv sync --extra dev

      - name: Copy frontend to backend static directory
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p src/leropilot/static
          cp -r frontend-artifact/* src/leropilot/static/
          ls -la src/leropilot/static

      - name: Generate backend-only build spec
        shell: bash
        run: |
          cat > build-backend.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          block_cipher = None

          a = Analysis(
              ['src/leropilot/main.py'],
              pathex=[],
              binaries=[],
              datas=[('src/leropilot/static', 'leropilot/static')],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=['torch', 'tensorflow', 'matplotlib', 'pytest'],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )

          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.zipfiles,
              a.datas,
              [],
              name='leropilot-backend',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          EOF

      - name: Build Python backend
        shell: bash
        run: |
          set -euxo pipefail
          uv run python -m PyInstaller --noconfirm --clean --log-level=INFO build-backend.spec
          mkdir -p dist/python
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/leropilot-backend.exe dist/python/
          else
            cp dist/leropilot-backend dist/python/
          fi
          ls -la dist/python

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package.json

      - name: Install Electron dependencies
        shell: bash
        run: |
          cd electron
          npm install

      - name: Prepare Electron resources
        shell: bash
        run: |
          echo "Copying Python backend to electron/python_backend..."
          mkdir -p electron/python_backend
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/python/leropilot-backend.exe electron/python_backend/
          else
            cp dist/python/leropilot-backend electron/python_backend/
          fi
          ls -la electron/python_backend/

      - name: Build Electron app
        shell: bash
        run: |
          cd electron
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron build output
        shell: bash
        run: |
          echo "=== Verifying Electron build output ==="
          echo "Listing electron/dist contents:"
          ls -la electron/dist/ || echo "electron/dist not found!"
          echo ""
          echo "Checking for win-unpacked directory:"
          ls -la electron/dist/win-unpacked/ || ls -la electron/dist/linux-unpacked/ || ls -la electron/dist/mac/ || echo "No unpacked directory found"
          echo ""
          echo "Listing resources directory:"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ls -la electron/dist/win-unpacked/resources/ || echo "No resources directory"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            ls -la electron/dist/linux-unpacked/resources/ || echo "No resources directory"
          else
            ls -la electron/dist/mac/*/Contents/Resources/ || echo "No resources directory"
          fi
          echo ""
          echo "Searching for packaged Python backend in resources:"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            find electron/dist/win-unpacked/resources -name "python" -type d || echo "No python directory in resources"
            find electron/dist/win-unpacked/resources/python -name "*.exe" 2>/dev/null || echo "No backend exe in resources/python"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            find electron/dist/linux-unpacked/resources -name "python" -type d || echo "No python directory in resources"
            find electron/dist/linux-unpacked/resources/python -name "leropilot-backend" 2>/dev/null || echo "No backend in resources/python"
          else
            find electron/dist/mac -name "python" -type d || echo "No python directory in resources"
          fi

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-macos-dmg
          path: electron/dist/*.dmg
          retention-days: 3

      - name: Upload macOS ZIP
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-macos-zip
          path: electron/dist/*.zip
          retention-days: 3

      - name: Upload Windows EXE
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-windows-exe
          path: electron/dist/*.exe
          retention-days: 3
          if-no-files-found: warn

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-linux-appimage
          path: electron/dist/*.AppImage
          retention-days: 3

      - name: Upload Linux tar.gz
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: leropilot-linux-targz
          path: electron/dist/*.tar.gz
          retention-days: 3
          if-no-files-found: ignore
