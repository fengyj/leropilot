# LeRobot Extras 元数据
# 定义可选依赖的分类和说明（中英文）

# v0.4.x 系列的 extras
v0.4.x:
  categories:
    robots:
      title_zh: "机器人硬件支持"
      title_en: "Robot Hardware Support"
      items:
        feetech:
          name_zh: "Feetech 电机"
          name_en: "Feetech Motors"
          description_zh: "支持 Feetech 伺服电机，用于 HopeJR、LeKiwi 等机器人"
          description_en: "Support for Feetech servo motors, used in HopeJR, LeKiwi robots"

        dynamixel:
          name_zh: "Dynamixel 电机"
          name_en: "Dynamixel Motors"
          description_zh: "支持 Dynamixel 伺服电机，广泛用于各种机器人平台"
          description_en: "Support for Dynamixel servo motors, widely used in robotics"

        gamepad:
          name_zh: "游戏手柄"
          name_en: "Gamepad"
          description_zh: "支持游戏手柄控制机器人"
          description_en: "Support for gamepad control"

        hopejr:
          name_zh: "HopeJR 机器人"
          name_en: "HopeJR Robot"
          description_zh: "HopeJR 人形机器人手臂支持"
          description_en: "Support for HopeJR humanoid robot arm"

        lekiwi:
          name_zh: "LeKiwi 机器人"
          name_en: "LeKiwi Robot"
          description_zh: "LeKiwi 移动机器人平台支持"
          description_en: "Support for LeKiwi mobile robot platform"

        reachy2:
          name_zh: "Reachy2 机器人"
          name_en: "Reachy2 Robot"
          description_zh: "Reachy2 机器人支持"
          description_en: "Support for Reachy2 robot"

        intelrealsense:
          name_zh: "Intel RealSense 相机"
          name_en: "Intel RealSense Camera"
          description_zh: "Intel RealSense 深度相机支持"
          description_en: "Support for Intel RealSense depth cameras"

        phone:
          name_zh: "手机遥控"
          name_en: "Phone Control"
          description_zh: "使用手机进行遥控操作"
          description_en: "Remote control via smartphone"

    policies:
      title_zh: "策略模型"
      title_en: "Policy Models"
      items:
        pi:
          name_zh: "PI0.5 模型"
          name_en: "PI0.5 Model"
          description_zh: "Physical Intelligence 0.5 视觉语言动作模型"
          description_en: "Physical Intelligence 0.5 Vision-Language-Action model"

        smolvla:
          name_zh: "SmolVLA 模型"
          name_en: "SmolVLA Model"
          description_zh: "小型视觉语言动作模型"
          description_en: "Small Vision-Language-Action model"

        groot:
          name_zh: "Gr00T 模型"
          name_en: "Gr00T Model"
          description_zh: "NVIDIA Gr00T 基础模型（需要特殊安装）"
          description_en: "NVIDIA Gr00T foundation model (requires special installation)"

        hilserl:
          name_zh: "HIL-SERL 模型"
          name_en: "HIL-SERL Model"
          description_zh: "Human-in-the-Loop SERL 强化学习模型"
          description_en: "Human-in-the-Loop SERL reinforcement learning model"

    simulations:
      title_zh: "仿真环境"
      title_en: "Simulation Environments"
      items:
        aloha:
          name_zh: "ALOHA 仿真"
          name_en: "ALOHA Simulation"
          description_zh: "ALOHA 机器人仿真环境"
          description_en: "ALOHA robot simulation environment"

        pusht:
          name_zh: "PushT 仿真"
          name_en: "PushT Simulation"
          description_zh: "PushT 推动任务仿真环境"
          description_en: "PushT pushing task simulation"

        libero:
          name_zh: "LIBERO 仿真"
          name_en: "LIBERO Simulation"
          description_zh: "LIBERO 基准测试仿真环境"
          description_en: "LIBERO benchmark simulation environment"

        metaworld:
          name_zh: "Meta-World 仿真"
          name_en: "Meta-World Simulation"
          description_zh: "Meta-World 多任务仿真环境"
          description_en: "Meta-World multi-task simulation environment"

    features:
      title_zh: "其他功能"
      title_en: "Additional Features"
      items:
        async:
          name_zh: "异步功能"
          name_en: "Async Features"
          description_zh: "异步通信和处理功能"
          description_en: "Asynchronous communication and processing"

        kinematics:
          name_zh: "运动学"
          name_en: "Kinematics"
          description_zh: "机器人运动学计算支持"
          description_en: "Robot kinematics computation support"

    development:
      title_zh: "开发工具"
      title_en: "Development Tools"
      items:
        dev:
          name_zh: "开发工具"
          name_en: "Development Tools"
          description_zh: "代码检查、调试等开发工具（不推荐普通用户安装）"
          description_en: "Code linting, debugging tools (not recommended for regular users)"

        test:
          name_zh: "测试工具"
          name_en: "Testing Tools"
          description_zh: "单元测试和集成测试工具"
          description_en: "Unit and integration testing tools"

        video_benchmark:
          name_zh: "视频基准测试"
          name_en: "Video Benchmarking"
          description_zh: "视频处理性能基准测试工具"
          description_en: "Video processing performance benchmarking"

    all:
      title_zh: "全部功能"
      title_en: "All Features"
      items:
        all:
          name_zh: "安装所有功能"
          name_en: "Install All Features"
          description_zh: "安装所有可选依赖（不包括 groot 和开发工具）"
          description_en: "Install all optional dependencies (excluding groot and dev tools)"

